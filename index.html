<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Деревенский кликер • Пирог и борщ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Segoe UI', 'Trebuchet MS', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #6b2e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
        }

        .rug-background {
            background-color: #9d4e37;
            background-image: 
                radial-gradient(circle at 20% 30%, #b86b4c 3px, transparent 3px),
                radial-gradient(circle at 80% 70%, #c47a5a 4px, transparent 4px),
                radial-gradient(circle at 40% 80%, #a35132 5px, transparent 5px),
                linear-gradient(45deg, #8b3e2b 2px, transparent 2px),
                linear-gradient(-45deg, #ac5a3f 1px, transparent 2px);
            background-size: 60px 60px, 80px 80px, 100px 100px, 30px 30px, 30px 30px;
            background-blend-mode: overlay;
            box-shadow: inset 0 0 30px #4f2a1b, 0 20px 30px rgba(0,0,0,0.5);
            border-radius: 70px 70px 40px 40px;
            padding: 30px 25px 30px 25px;
            border: 8px solid #633c29;
            outline: 4px solid #844d33;
            max-width: 1100px;
            width: 100%;
        }

        .game-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .click-area {
            flex: 2 1 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(160, 85, 55, 0.3);
            backdrop-filter: blur(2px);
            border-radius: 60px 60px 40px 40px;
            padding: 30px 15px;
            box-shadow: inset 0 0 25px #441e10, 0 10px 20px #3b1b0e;
        }

        .score-panel {
            background: #fde9d4;
            padding: 24px 40px;
            border-radius: 100px;
            margin-bottom: 40px;
            font-size: 3.5rem;
            font-weight: 900;
            color: #4b2a19;
            box-shadow: 0 12px 0 #7b4f37, 0 15px 25px black;
            border: 3px solid #ad7a5a;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0 #ffcf9c;
            font-family: 'Courier New', monospace;
        }

        .clickable-object {
            cursor: pointer;
            transition: transform 0.05s ease, filter 0.1s;
            max-width: 380px;
            width: 100%;
            filter: drop-shadow(0 25px 15px #2f140b);
        }

        .clickable-object:active {
            transform: scale(0.94);
            filter: drop-shadow(0 10px 8px #2f140b) brightness(1.08);
        }

        .clickable-object img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }

        .upgrade-panel {
            flex: 1 1 260px;
            background: #c9a77b;
            background: linear-gradient(165deg, #b58c63, #dabb96);
            border: 7px solid #8b6240;
            border-radius: 70px 20px 70px 20px;
            box-shadow: inset 2px 2px 15px #efdbbc, inset -3px -3px 15px #6f4f33, 0 25px 30px #321e12;
            padding: 30px 20px;
            color: #2f1e10;
            display: flex;
            flex-direction: column;
            gap: 35px;
            backdrop-filter: blur(4px);
        }

        .upgrade-card {
            background: #fef0da;
            border-radius: 40px 15px 40px 15px;
            padding: 20px 15px 25px 15px;
            box-shadow: inset 0 -5px 0 #ac8a64, 0 10px 10px #4f301e;
            border: 2px solid #f7ca9c;
            text-align: center;
        }

        .upgrade-card h3 {
            font-size: 1.9rem;
            font-weight: 900;
            color: #613d26;
            text-shadow: 2px 2px 0 #ebbc8b;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .upgrade-icon {
            width: 110px;
            height: 110px;
            margin: 0 auto 15px;
            background: #e1c096;
            border-radius: 50%;
            padding: 8px;
            border: 5px solid #a56d45;
            box-shadow: 0 5px 0 #6e442a;
        }

        .upgrade-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transform: scale(1.08);
        }

        .multiplier-badge {
            background: #7f4e2d;
            color: #ffeec2;
            font-weight: bold;
            font-size: 1.5rem;
            padding: 8px 12px;
            border-radius: 60px;
            display: inline-block;
            margin: 10px 0 6px;
            border: 2px solid #efb179;
            box-shadow: inset 0 -3px 0 #4f2c17;
        }

        .price-tag {
            background: #4b3827;
            color: #fedb9f;
            padding: 12px 5px;
            font-size: 1.7rem;
            font-weight: 800;
            border-radius: 30px;
            margin: 15px 0 8px;
            border: 2px solid #c99e6b;
            box-shadow: 0 6px 0 #2d1d12;
        }

        .buy-btn {
            background: #d6a870;
            border: none;
            padding: 18px 5px;
            font-size: 1.9rem;
            font-weight: 900;
            color: #392613;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 9px 0 #7c5333, 0 4px 15px black;
            transition: 0.06s linear;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 2px solid #fbeab9;
            width: 100%;
        }

        .buy-btn:active {
            transform: translateY(6px);
            box-shadow: 0 3px 0 #7c5333;
        }

        .buy-btn:disabled {
            opacity: 0.5;
            transform: translateY(5px);
            box-shadow: 0 4px 0 #5e3f28;
            cursor: not-allowed;
            pointer-events: none;
        }

        .owned-stamp {
            font-size: 1.4rem;
            background: #a66d49;
            color: #faeac4;
            border-radius: 30px;
            padding: 5px 15px;
            display: inline-block;
            border: 2px solid #fec27e;
        }

        .footer-hint {
            margin-top: 20px;
            color: #ffddbb;
            font-weight: bold;
            text-shadow: 3px 3px 0 #6b301b;
            font-size: 1.4rem;
            text-align: center;
            background: #682f1bb0;
            border-radius: 50px;
            padding: 8px 15px;
        }

        @media (max-width: 750px) {
            .score-panel { font-size: 2.8rem; padding: 18px 20px; }
            .rug-background { padding: 15px; }
        }
    </style>
</head>
<body>
<div class="rug-background">
    <div class="game-container">
        <div class="click-area">
            <div class="score-panel" id="scoreDisplay">0</div>
            <div class="clickable-object" id="clickableItem">
                <img id="clickerImage" src="" alt="вкусняшка">
            </div>
            <div class="footer-hint">⚡ жми на пирог! ⚡</div>
        </div>

        <div class="upgrade-panel">
            <div class="upgrade-card">
                <h3>🍲 Борщ</h3>
                <div class="upgrade-icon">
                    <img src="https://static.vecteezy.com/system/resources/previews/052/241/914/non_2x/mouthwatering-borscht-clipart-featuring-colorful-beets-and-vegetables-free-png.png" alt="борщ">
                </div>
                <div class="multiplier-badge">×2</div>
                <div class="price-tag" id="borschtPrice">5000</div>
                <button class="buy-btn" id="buyBorschtBtn">Купить</button>
                <div id="borschtStatus" class="owned-stamp" style="margin-top: 10px;">⛔ не куплено</div>
            </div>

            <div class="upgrade-card">
                <h3>🥧 Пирожок</h3>
                <div class="upgrade-icon">
                    <img src="https://img2.pngindir.com/20180613/jyz/aa7gnyvbd.webp" alt="пирожок">
                </div>
                <div class="multiplier-badge">×5</div>
                <div class="price-tag" id="piePrice">40000</div>
                <button class="buy-btn" id="buyPieBtn">Купить</button>
                <div id="pieStatus" class="owned-stamp" style="margin-top: 10px;">⛔ не куплено</div>
            </div>

            <div style="background: #e4bf8b; border-radius: 30px; padding: 12px; text-align: center; font-size: 1.3rem; border: 3px dashed #8f623d;">
                💪🏻 Сила клика:<br> <span id="currentMultiplierSpan">1 (пирог)</span>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // --- Состояние игры ---
        let clicks = 0;
        let multiplier = 1;
        let borschtOwned = false;
        let pieOwned = false;

        const BORSCHT_PRICE = 5000;
        const PIE_PRICE = 40000;

        // --- Элементы DOM ---
        const scoreDisplay = document.getElementById('scoreDisplay');
        const clickableDiv = document.getElementById('clickableItem');
        const clickerImage = document.getElementById('clickerImage');

        const buyBorschtBtn = document.getElementById('buyBorschtBtn');
        const buyPieBtn = document.getElementById('buyPieBtn');
        const borschtStatus = document.getElementById('borschtStatus');
        const pieStatus = document.getElementById('pieStatus');
        const currentMultiplierSpan = document.getElementById('currentMultiplierSpan');

        const borschtPriceSpan = document.getElementById('borschtPrice');
        const piePriceSpan = document.getElementById('piePrice');

        const IMAGES = {
            pie: 'https://png.pngtree.com/png-vector/20240808/ourlarge/pngtree-apple-pie-png-image_13408658.png',
            borscht: 'https://static.vecteezy.com/system/resources/previews/052/241/914/non_2x/mouthwatering-borscht-clipart-featuring-colorful-beets-and-vegetables-free-png.png',
            pirogok: 'https://img2.pngindir.com/20180613/jyz/aa7gnyvbd.webp'
        };

        // === НОВАЯ ФУНКЦИЯ: Сохранение игры в localStorage ===
        function saveGame() {
            const gameState = {
                clicks: clicks,
                borschtOwned: borschtOwned,
                pieOwned: pieOwned
            };
            localStorage.setItem('clickerGameSave', JSON.stringify(gameState));
            console.log('Игра сохранена'); // для отладки (можно удалить)
        }

        // === НОВАЯ ФУНКЦИЯ: Загрузка игры из localStorage ===
        function loadGame() {
            const savedState = localStorage.getItem('clickerGameSave');
            if (savedState) {
                try {
                    const gameState = JSON.parse(savedState);
                    clicks = gameState.clicks || 0;
                    borschtOwned = gameState.borschtOwned || false;
                    pieOwned = gameState.pieOwned || false;
                    console.log('Игра загружена'); // для отладки
                } catch (e) {
                    console.error('Ошибка загрузки сохранения', e);
                }
            }
        }

        // --- Функция обновления интерфейса ---
        function refreshUI() {
            if (pieOwned) {
                clickerImage.src = IMAGES.pirogok;
                multiplier = 5;
                currentMultiplierSpan.innerText = '5 (пирожок)';
            } else if (borschtOwned) {
                clickerImage.src = IMAGES.borscht;
                multiplier = 2;
                currentMultiplierSpan.innerText = '2 (борщ)';
            } else {
                clickerImage.src = IMAGES.pie;
                multiplier = 1;
                currentMultiplierSpan.innerText = '1 (пирог)';
            }

            scoreDisplay.innerText = clicks;

            if (!borschtOwned) {
                borschtStatus.innerText = '⛔ не куплено';
                buyBorschtBtn.disabled = (clicks < BORSCHT_PRICE);
            } else {
                borschtStatus.innerText = '✅ приготовлен';
                buyBorschtBtn.disabled = true;
            }

            if (!pieOwned) {
                pieStatus.innerText = '⛔ не куплено';
                buyPieBtn.disabled = (clicks < PIE_PRICE);
            } else {
                pieStatus.innerText = '✨ испечён';
                buyPieBtn.disabled = true;
            }

            borschtPriceSpan.innerText = BORSCHT_PRICE;
            piePriceSpan.innerText = PIE_PRICE;

            // === НОВОЕ: Сохраняем игру при каждом обновлении интерфейса ===
            saveGame();
        }

        // --- Обработчик клика по пирогу ---
        function handleClickItem(e) {
            clicks += multiplier;
            refreshUI(); // saveGame() вызовется внутри refreshUI
        }

        // --- Покупка борща ---
        function buyBorscht() {
            if (clicks >= BORSCHT_PRICE && !borschtOwned) {
                clicks -= BORSCHT_PRICE;
                borschtOwned = true;
                refreshUI();
            } else {
                alert('Не хватает кликов или борщ уже куплен');
            }
        }

        // --- Покупка пирожка ---
        function buyPie() {
            if (clicks >= PIE_PRICE && !pieOwned) {
                clicks -= PIE_PRICE;
                pieOwned = true;
                refreshUI();
            } else {
                alert('Не хватает кликов или пирожок уже испечён');
            }
        }

        // --- Инициализация игры ---
        function initGame() {
            // === НОВОЕ: Сначала загружаем сохранение ===
            loadGame();

            clickerImage.src = IMAGES.pie; // временно, refreshUI исправит

            clickableDiv.addEventListener('click', handleClickItem);
            buyBorschtBtn.addEventListener('click', buyBorscht);
            buyPieBtn.addEventListener('click', buyPie);

            refreshUI(); // здесь уже применится загруженное состояние и сохранится
        }

        // Старт
        initGame();
    })();
</script>
</body>
  </html>
